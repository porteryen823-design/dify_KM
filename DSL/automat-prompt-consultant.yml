app:
  name: "AUTOMAT 提示語顧問"
  mode: advanced-chat
  icon: "🧙‍♂️"
  icon_background: "#FFEAD5"
  description: "專注於多輪對話引導的提示語專家。透過引導式問題，幫助你從零開始建構完整的 AUTOMAT 提示語框架。 V0.1"
  use_icon_as_answer_icon: false
kind: app
version: 0.6.0
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    opening_statement: |
      你好！我是你的 AUTOMAT 提示語顧問 🧙‍♂️

      填寫 Prompt 常讓人抓不到頭緒，所以我會帶你一步步釐清 7 個關鍵元素。
      
      請問你今天想要設計什麼樣的任務或機器人呢？（例如：我想做一個整理會議紀錄的助手）
    suggested_questions:
      - "我想要寫一個社群貼文助手。"
      - "幫我設計一個翻譯技術文件的機器人。"
      - "我想建立一個自動回覆 Email 的小幫手。"
    suggested_questions_after_answer:
      enabled: false
    retriever_resource:
      enabled: false
  graph:
    edges:
      - id: "edge-start-llm"
        source: "start-node"
        sourceHandle: "source"
        target: "llm-node"
        targetHandle: "target"
        type: "custom"
        data:
          sourceType: "start"
          targetType: "llm"
      - id: "edge-llm-answer"
        source: "llm-node"
        sourceHandle: "source"
        target: "answer-node"
        targetHandle: "target"
        type: "custom"
        data:
          sourceType: "llm"
          targetType: "answer"
    nodes:
      - id: "start-node"
        type: "custom"
        position:
          x: 40
          y: 200
        positionAbsolute:
          x: 40
          y: 200
        width: 242
        height: 73
        data:
          title: "開始"
          type: "start"
          variables: []
      - id: "llm-node"
        type: "custom"
        position:
          x: 340
          y: 200
        positionAbsolute:
          x: 340
          y: 200
        width: 242
        height: 120
        data:
          title: "提示語顧問"
          type: "llm"
          model:
            provider: ollama
            name: "minimax-m2.5:cloud"
            mode: "chat"
            completion_params:
              temperature: 0.7
          prompt_template:
            - role: "system"
              text: |
                # Role: 提示語工程專家 (AUTOMAT 顧問)

                ## Profile
                你是一位精通提示語工程 (Prompt Engineering) 的高級顧問。你的任務是透過引導式對話，協助使用者完善 AUTOMAT 框架。

                ## AUTOMAT 框架
                - A (Actor), U (User), T (Task), O (Output), M (Method), A (Assumptions), T (Tone)

                ## 核心對話原則
                1. **不要一次問完**：每次對話只針對缺失的 1~2 個最關鍵元素提出引導問題。
                2. **舉例說明**：當用戶困惑時，提供一個簡單的範例參考。
                3. **進度更新**：讓用戶清楚目前已經確定了哪些元素。
                4. **最終產出**：當 7 個元素備齊後，將成品轉化為一份完整的 System Prompt。
            - role: "user"
              text: "{{#sys.query#}}"
      - id: "answer-node"
        type: "custom"
        position:
          x: 640
          y: 200
        positionAbsolute:
          x: 640
          y: 200
        width: 242
        height: 100
        data:
          title: "回覆"
          type: "answer"
          answer: "{{#llm-node.text#}}"
    viewport:
      x: 0
      y: 0
      zoom: 1

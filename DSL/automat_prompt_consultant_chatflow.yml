    opening_statement: "你好！我是你的 **AUTOMAT 提示語顧問** 🤖\n\n寫出高品質 Prompt 的關鍵，在於釐清 **7 個核心元素**：\n\n| 代號 | 元素 | 說明 |\n|------|------|------|\n| **A** | Act as a... | 機器人的專業角色 |\n| **U** | User Persona | 目標使用者是誰 |\n| **T** | Targeted Action | 要完成的核心任務 |\n| **O** | Output Definition | 輸出的格式與結構 |\n| **M** | Mode/Style | 語氣與表達風格 |\n| **A** | Atypical Cases | 異常情況的處理邏輯 |\n| **T** | Topic Whitelist | 允許討論的主題範圍 |\n\n我們會透過幾輪對話，一起把你的需求變成一個完整的 Prompt！\n\n✨ 請告訴我你想設計什麼 AI 機器人或任務："
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - 我想要一個幫我寫社群貼文的機器人。
    - 我需要一個能夠自動回覆客戶客訴信件的機器人。
    - 如何優化我的 RAG 提示語？
    - 幫我設計一個每日任務提醒 bot，語氣要像教練。
    - 我想讓 AI 幫我分析財報，輸出要有結構化摘要。
    suggested_questions_after_answer:
      enabled: true
    text_to_speech:
      enabled: false
      language: ''
      voice: ''

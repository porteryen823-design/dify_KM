    opening_statement: '你好！我是你的 AUTOMAT 提示語顧問 👋


      要寫出好的 Prompt，我們需要釐清 7 個關鍵元素。不用擔心，我會在一問一答中帶你一步步完成！請問你今天想要設計什麼樣的 AI 機器人或任務呢？（例如：我想做一個幫我整理會議紀錄的助手、或是用於翻譯技術文件的機器人）

      '
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - 我想要一個幫我寫社群貼文的機器人。
    - 我需要一個能夠自動回覆客戶客訴信件的機器人。
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    edges:

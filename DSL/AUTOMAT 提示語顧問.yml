        sourceType: start
        targetType: llm
      id: edge-start-llm
      source: start-node
      sourceHandle: source
      target: llm-node
      targetHandle: target
      type: custom
    - data:
        sourceType: llm
        targetType: answer
      id: edge-llm-answer
      source: llm-node
      sourceHandle: source
      target: answer-node
      targetHandle: target
      type: custom
    nodes:
    - data:
        selected: false
        title: 開始
        type: start
        variables: []
      height: 72
      id: start-node
      position:
        x: 40
        y: 200
      positionAbsolute:
        x: 40
        y: 200
      selected: false
      type: custom
      width: 242
    - data:
        context:
          enabled: true
          variable_selector:
          - sys
          - query
        memory:
          query_prompt_template: '{{#sys.query#}}


            {{#sys.files#}}'
          role_prefix:
            assistant: ''
            user: ''
          window:
            enabled: false
            size: 50
        model:
          completion_params:
            temperature: 0.7
          mode: chat
          name: gemini-2.5-flash
          provider: langgenius/gemini/google
        prompt_template:
        - id: 8cd514c7-95be-4c12-a841-b910bc922bab
          role: system
          text: '# Role: 提示語工程專家 (AUTOMAT 顧問)


            ## Profile

            你是一位精通提示語工程 (Prompt Engineering) 的高級顧問，擅長使用 AUTOMAT 框架將使用者的模糊需求，轉化為極度精準、具備邏輯且高效的
            LLM 指令。在你與使用者對話的過程中，你會一步步引導他們釐清 7 個核心元素。


            ## AUTOMAT 框架參考

            - **A (Actor):** 指定 AI 扮演什麼角色。

            - **U (User / Audience):** 內容要給誰看，目標對象背景。

            - **T (Task):** AI 需要完成的具體工作。

            - **O (Output):** 要什麼格式、結構與字數輸出。

            - **M (Method):** 採用哪些方法或邏輯來完成任務。

            - **A (Assumptions):** 任務的已知背景、前提預設或限制條件。

            - **T (Tone):** 指定的語氣或寫作風格。


            ## Workflow

            1. **意圖解析**：當使用者輸入初步需求時，分析目標。

            2. **缺口分析**：檢視目前資訊對比 AUTOMAT 框架缺點。

            3. **主動詢問 (多輪對話)**：不要一次問完！每次只針對缺失的 1~2 個最關鍵元素主動引導並舉例。

            4. **框架盤點**：收集要素後，先條列展示分析結果。

            5. **最終建議產出**：幫助使用者撰寫出最終建議的 System Prompt。

            '
        - id: 3e3eb62a-1abe-474d-b26c-56d80865c4fd
          role: user
          text: '{{#sys.query#}}'
        selected: true
        title: LLM
        type: llm
        vision:
          enabled: false
      height: 87
      id: llm-node

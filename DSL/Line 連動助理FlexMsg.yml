    - data:
        sourceType: start
        targetType: http-request
      id: start-to-http
      source: start
      sourceHandle: source
      target: http_request_line
      targetHandle: target
      type: custom
    - data:
        sourceType: http-request
        targetType: answer
      id: http-to-answer
      source: http_request_line
      sourceHandle: source
      target: answer
      targetHandle: target
      type: custom

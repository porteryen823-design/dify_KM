  environment_variables:
  - description: LINE Channel Access Token
    id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
    name: LINE_CHANNEL_ACCESS_TOKEN
    selector:
    - env
    - LINE_CHANNEL_ACCESS_TOKEN
    value: xv7a1j7jR8o22tgsLvOYfVwEhsKo2N29ru7zHDAUUKLih21/zHB/nZqzbQ+VG54teKPFypCmZmHi0MpP34A8Xma0Hc1pwkGAzGtGs1YVjYhU2672ScJt0mObFXMJxae5ZIkC8fGByIkMyMY6853k9QdB04t89/1O/w1cDnyilFU=
    value_type: secret
  - description: 目標 LINE 使用者 ID（接收訊息的 userId）
    id: b2c3d4e5-f6a7-8901-bcde-f12345678901
    name: LINE_USER_ID
    selector:
    - env
    - LINE_USER_ID
    value: Uc83af6e58fd43c6da36a9285435a82e0
    value_type: string
  features:
    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - image
      allowed_file_upload_methods:
      - local_file
      - remote_url
      enabled: false
      fileUploadConfig:
        attachment_image_file_size_limit: 2
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        file_upload_limit: 20
        image_file_batch_limit: 10
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: ''
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:

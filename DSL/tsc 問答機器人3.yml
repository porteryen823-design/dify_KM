    opening_statement: "歡迎使用 TSC 交管問答機器人！\n\n我可以回答關於廠區交管邏輯、堵車處理、會車衝突等問題。\n\n📌 範例問題：\n- 什麼是 TSC 交管？\n- 繞路的前提是什麼？\n- 如果前車故障不動，堵車能解除嗎？\n- 兩台車要同時進電梯怎麼辦？"

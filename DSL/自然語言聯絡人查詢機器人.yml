          Docker Desktop 的網路設定或防火牆規則而連不上。","type":"text","version":1}],"direction":null,"format":"start","indent":0,"type":"listitem","version":1,"textFormat":1,"value":1},{"children":[{"detail":0,"format":1,"mode":"normal","style":"","text":"解決方案","type":"text","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"：在
          Docker 內部網路中，最穩定且高效的連線方式是直接使用 ","type":"text","version":1},{"detail":0,"format":1,"mode":"normal","style":"","text":"容器名稱","type":"text","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":" 字串。您的後端容器名稱為 ","type":"text","version":1},{"detail":0,"format":16,"mode":"normal","style":"","text":"dify-login_app-1","type":"text","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"，且在網路上有個別名為 ","type":"text","version":1},{"detail":0,"format":16,"mode":"normal","style":"","text":"login_app","type":"text","version":1},{"detail":0,"format":0,"mode":"normal","style":"","text":"。","type":"text","version":1}],"direction":null,"format":"start","indent":0,"type":"listitem","version":1,"textFormat":1,"value":2},{"children":[],"direction":null,"format":"start","indent":0,"type":"listitem","version":1,"value":3}],"direction":null,"format":"","indent":0,"type":"list","version":1,"textFormat":1,"listType":"number","start":1,"tag":"ol"},{"children":[{"detail":0,"format":0,"mode":"normal","style":"","text":"我已經更新了

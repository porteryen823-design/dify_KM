    - data:
        code: "import json\n\ndef main(llm_output: str, **kwargs) -> dict:  # 務必加上\
          \ **kwargs 防止報錯\n    try:\n        # 1. 清理 LLM 可能輸出的 Markdown 標籤\n     \
          \   text = llm_output.strip()\n        if text.startswith(\"```json\"):\n\
          \            text = text[7:]\n        if text.endswith(\"```\"):\n     \
          \       text = text[:-3]\n        \n        data = json.loads(text.strip())\n\
          \        \n        # 2. 檢查缺失欄位 (amount, store, item 是必填)\n        missing\
          \ = data.get(\"missing\", [])\n        if missing and len(missing) > 0:\n\
          \            fields = {\"amount\": \"金額\", \"store\": \"店家\", \"item\":\
          \ \"品項\"}\n            prompts = [fields[f] for f in missing if f in fields]\n\
          \            return {\n                \"ok\": \"false\",\n            \
          \    \"amount\": 0.0,\n                \"store\": \"\",\n              \
          \  \"item\": \"\",\n                \"memo\": \"\",\n                \"\
          date\": \"\",\n                \"reply\": f\"資訊不完整喔，請補充：{'、'.join(prompts)}\"\
          \n            }\n        \n        # 3. 成功解析：回傳所有截圖中的變數\n        return\
          \ {\n            \"ok\": \"true\",\n            \"amount\": float(data.get(\"\
          amount\", 0)),\n            \"store\": data.get(\"store\", \"\"),\n    \
          \        \"item\": data.get(\"item\", \"\"),\n            \"memo\": data.get(\"\
          memo\", \"\") or \"\",\n            \"date\": data.get(\"date\", \"\") or\
          \ \"\", # 這裡對應您的 date String 變數\n            \"reply\": \"解析成功，準備存入資料庫。\"\
          \n        }\n        \n    except Exception as e:\n        return {\n  \
          \          \"ok\": \"false\",\n            \"amount\": 0.0,\n          \
          \  \"store\": \"\",\n            \"item\": \"\",\n            \"memo\":\
          \ \"\",\n            \"date\": \"\",\n            \"reply\": f\"程式執行錯誤：{str(e)}\"\
          \n        }"

    opening_statement: "嗨！👋 我是 TSC 專家小幫手，可以協助你快速了解 TSC 交管系統。以下是一些常見的問題，你也可以直接問我任何 TSC 相關的問題喔！\n\n**常見問題參考：**\n1. 什麼是趕車機制？\n2. 為什麼車不能想走就走？\n3. 如果兩台車完全無法透過其他方式會車，最終方案是什麼？\n4. 一個停車站可以同時屬於不同群組嗎？\n5. 交管系統在路權管理上遵循什麼基本原則？\n6. 為什麼一定要輪流？\n7. 如果一台車故障了，會一直占著路嗎？\n8. 什麼是避車彎？用途是什麼？\n9. occupied_route 的用途是什麼？它和 group 有什麼差別？\n10. 車輛在手動模式下交管還生效嗎？"
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - 宏動作執行失敗時，系統怎麼處理？
    - 死鎖判定後，系統會自動解除嗎？需要人工介入嗎？
    - 兩台車在路口相遇，方向相反時怎麼辦？
    - TSC 如何判斷是否發生了死鎖？
    - 什麼是 RobotRouteLock？什麼時候會生效？
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''

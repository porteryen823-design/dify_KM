    opening_statement: "Welcome! / 歡迎！/ ようこそ！\n\n我是 **TSC 交通管理專業小幫手**！我可以回答關於廠區交管邏輯、堵車處理與會車衝突等問題。\n\n🌐 **語言切換指令**：\n您可以手動輸入以下指令切換回答語言：\n- `/lang zh-tw` (繁體中文)\n- `/lang zh-cn` (简体中文)\n- `/lang en` (English)\n\n有什麼我可以幫您的嗎？"
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - 什麼是 TSC 交管？
    - 繞路的前提是什麼？
    - 如果前車故障不動，堵車能解除嗎？
    - /lang en
    suggested_questions_after_answer:
      enabled: true
    text_to_speech:
      enabled: false

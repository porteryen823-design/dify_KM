      *   📦 **庫存管理**：產品存量、單價與分類資訊。\n*   👥 **客戶與供應商**：各個城市（如 Miami、New York）的合作夥伴概況。\n*   📑 **銷售統計**：查詢最近訂單、各員工銷售筆數或業績表現。\n\
      \n**您可以直接用自然語言問我問題，我會為您生成 SQL 並執行查詢。**"

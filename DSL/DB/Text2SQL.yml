        - id: 096316c1-8d66-4462-b466-c80871a007d1
          role: system
          text: "# Role\n你是一位專家級 SQL 工程師，專門服務「北風資料庫 (Northwind Traders v2.0)」。\n\n\
            # Northwind 2.0 FULL Schema\n本資料庫採用 `snake_case` 命名法：\n\n## 核心業務表\n- **customers**:\
            \ id, company, last_name, first_name, email_address, job_title, business_phone,\
            \ city, country_region\n- **employees**: id, last_name, first_name, email_address,\
            \ job_title\n- **products**: id, product_code, product_name, category,\
            \ standard_cost, list_price, quantity_per_unit, discontinued\n- **orders**:\
            \ id, employee_id, customer_id, order_date, shipped_date, shipper_id,\
            \ shipping_fee, status_id\n- **order_details**: id, order_id, product_id,\
            \ quantity, unit_price, discount, status_id\n\n## 庫存與供需\n- **inventory_transactions**:\
            \ id, transaction_type, transaction_created_date, product_id, quantity,\
            \ customer_order_id, purchase_order_id\n- **purchase_orders**: id, supplier_id,\
            \ submitted_date, status_id\n- **suppliers**: id, company, last_name,\
            \ first_name, city, country_region\n\n## 狀態與輔助\n- **orders_status**:\
            \ id, status_name\n- **shippers**: id, company, phone\n\n# CRITICAL OUTPUT\
            \ RULES\n1. 直接輸出 SQL。\n2. 禁止 Markdown 標籤與前言說明。\n\n**整理人：** Antigravity AI\
            \ & Porter"
        selected: false
        title: 1.產生SQL
        type: llm
        vision:
          enabled: false
      height: 87
      id: llm_sql
      position:
        x: 320
        y: 282
      positionAbsolute:
        x: 320
        y: 282
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: "def main(llm_text: str) -> dict:\n    think_end = llm_text.rfind('</think>')\n\
          \    text = llm_text[think_end + 8:].strip() if think_end != -1 else llm_text.strip()\n\
          \    if '```' in text:\n        parts = text.split('```')\n        if len(parts)\
          \ > 1:\n            block = parts[1].strip()\n            if block.lower().startswith('sql'):\n\
          \                block = block[3:].strip()\n            text = block\n \
          \   keywords = ['SELECT', 'WITH', 'UPDATE', 'DELETE', 'INSERT', 'SHOW',\
          \ 'DESCRIBE']\n    text_upper = text.upper()\n    earliest = len(text)\n\
          \    for kw in keywords:\n        pos = text_upper.find(kw)\n        if\
          \ pos != -1 and pos < earliest:\n            earliest = pos\n    sql = text[earliest:].strip()\
          \ if earliest < len(text) else text.strip()\n    return {'result': sql if\
          \ sql else '/* NO SQL */'}\n"
        code_language: python3
        outputs:
          result:
            children: null
            type: string
        selected: false
        title: 2.清理SQL

app:
  description: ''
  icon: 🤖
  icon_background: '#FFEAD5'
  mode: advanced-chat
  name: Text2SQL
  use_icon_as_answer_icon: false
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/ollama:0.1.2@fcf107badccaf57948634ad2c557d393c3894138d83f4eb3f959e9a1d3a86512
    version: null
kind: app
version: 0.6.0
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    opening_statement: "您好！我是您的 **Northwind 2.0 數據分析助手**。"
    suggested_questions:
    - 請列出目前庫存低於 100 的所有產品清單。
    - 哪位員工所處理的訂單筆數最多？
  graph:
    edges:
    - data:
        sourceType: start
        targetType: llm
      id: start-llm
      source: start
      target: llm_sql
    - data:
        sourceType: llm
        targetType: tool
      id: llm-tool
      source: llm_sql
      target: sql_tool
    - data:
        sourceType: tool
        targetType: answer
      id: tool-answer
      source: sql_tool
      target: answer
    nodes:
    - data:
        title: 開始
        type: start
      id: start
      position:
        x: 80
        y: 282
      type: custom
    - data:
        model:
          completion_params:
            temperature: 0.1
          mode: chat
          name: gpt-oss:20b
          provider: langgenius/ollama/ollama
        prompt_template:
        - role: system
          text: "你是一位專家級 SQL 工程師，服務於 Northwind 2.0 (snake_case)。\n\n規則：\n1. 只輸出 SQL。\n2. 禁止 Markdown 標籤。\n3. 如果資料庫中有 products, orders, employees 表。"
        title: 選取 SQL
        type: llm
      id: llm_sql
      position:
        x: 380
        y: 282
      type: custom
    - data:
        provider_id: junjiem/db_query/db_query
        provider_name: junjiem/db_query/db_query
        provider_type: builtin
        title: 執行 SQL
        tool_configurations:
          db_host: db
          db_name: northwind
          db_password: gsi5613686#
          db_port: '3306'
          db_type: mysql
          db_username: root
          output_format: markdown
          query_sql:
            type: variable
            value:
            - llm_sql
            - text
        tool_label: SQL Query
        tool_name: sql_query
        type: tool
      id: sql_tool
      position:
        x: 680
        y: 282
      type: custom
    - data:
        answer: "根據您的查詢，結果如下：\n\n{{#sql_tool.text#}}\n\n*注意：若結果顯示為空或為 0，代表查無相關資料。*"
        title: 回覆
        type: answer
      id: answer
      position:
        x: 980
        y: 282
      type: custom

    - data:
        code: "def main(llm_text: str) -> dict:\n    # 1. 找最後一個 </think> 標籤，切除思考區塊\n\
          \    think_end = llm_text.rfind('</think>')\n    if think_end != -1:\n \
          \       text = llm_text[think_end + 8:].strip()\n    else:\n        text\
          \ = llm_text.strip()\n    \n    # 2. 移除 Markdown ``` 標籤\n    if '```' in\
          \ text:\n        parts = text.split('```')\n        if len(parts) > 1:\n\
          \            block = parts[1].strip()\n            if block.lower().startswith('sql'):\n\
          \                block = block[3:].strip()\n            text = block\n \
          \   \n    # 3. 找到第一個 SQL 關鍵字的位置\n    keywords = ['SELECT', 'WITH', 'UPDATE',\
          \ 'DELETE', 'INSERT', 'SHOW', 'DESCRIBE']\n    text_upper = text.upper()\n\
          \    earliest = len(text)\n    \n    for kw in keywords:\n        pos =\
          \ text_upper.find(kw)\n        if pos != -1 and pos < earliest:\n      \
          \      earliest = pos\n    \n    if earliest < len(text):\n        sql =\
          \ text[earliest:].strip()\n    else:\n        sql = text.strip()\n    \n\
          \    # 4. 保底\n    if not sql:\n        sql = '/* NO SQL GENERATED */'\n\
          \    \n    return {'result': sql}\n"
        code_language: python3
        outputs:
          result:
            children: null
            type: string
        selected: false

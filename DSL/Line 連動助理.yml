app:
  description: 串接 LINE Messaging API 範例，支援 Flex Message 快速按鈕 V0.1
  icon: 💬
  icon_background: '#DEFFEE'
  mode: advanced-chat
  name: Line 連動助理
  use_icon_as_answer_icon: false
dependencies: []
kind: app
version: 0.6.0
workflow:
  conversation_variables: []
  environment_variables:
  - description: LINE Channel Access Token
    id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
    name: LINE_CHANNEL_ACCESS_TOKEN
    selector:
    - env
    - LINE_CHANNEL_ACCESS_TOKEN
    value: 'xv7a1j7jR8o22tgsLvOYfVwEhsKo2N29ru7zHDAUUKLih21/zHB/nZqzbQ+VG54teKPFypCmZmHi0MpP34A8Xma0Hc1pwkGAzGtGs1YVjYhU2672ScJt0mObFXMJxae5ZIkC8fGByIkMyMY6853k9QdB04t89/1O/w1cDnyilFU='
    value_type: secret
  - description: 目標 LINE 使用者 ID（接收訊息的 userId）
    id: b2c3d4e5-f6a7-8901-bcde-f12345678901
    name: LINE_USER_ID
    selector:
    - env
    - LINE_USER_ID
    value: 'Uc83af6e58fd43c6da36a9285435a82e0'
    value_type: string
  features:
    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - image
      allowed_file_upload_methods:
      - local_file
      - remote_url
      enabled: false
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: ''
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    edges:
    - data:
        sourceType: start
        targetType: http-request
      id: start-to-http
      source: start
      sourceHandle: source
      target: http_request_line
      targetHandle: target
      type: custom
    - data:
        sourceType: http-request
        targetType: answer
      id: http-to-answer
      source: http_request_line
      sourceHandle: source
      target: answer
      targetHandle: target
      type: custom
    nodes:
    - data:
        desc: ''
        selected: false
        title: 開始
        type: start
        variables: []
      height: 54
      id: start
      position:
        x: 80
        y: 282
      positionAbsolute:
        x: 80
        y: 282
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        authorization:
          config: null
          type: no-auth
        body:
          data:
          - type: text
            value: >-
              {
                "to": "{{#env.LINE_USER_ID#}}",
                "messages": [
                  {
                    "type": "flex",
                    "altText": "收到新訊息：{{#sys.query#}}",
                    "contents": {
                      "type": "bubble",
                      "body": {
                        "type": "box",
                        "layout": "vertical",
                        "contents": [
                          {
                            "type": "box",
                            "layout": "horizontal",
                            "contents": [
                              {
                                "type": "text",
                                "text": "收到新訊息：{{#sys.query#}}",
                                "weight": "bold",
                                "color": "#000000",
                                "wrap": true
                              }
                            ]
                          },
                          {
                            "type": "separator",
                            "margin": "md"
                          },
                          {
                            "type": "box",
                            "layout": "horizontal",
                            "contents": [
                              {
                                "type": "text",
                                "text": "歡迎使用線上查詢系統",
                                "color": "#555555"
                              }
                            ]
                          }
                        ]
                      },
                      "footer": {
                        "type": "box",
                        "layout": "horizontal",
                        "spacing": "sm",
                        "contents": [
                          {
                            "type": "button",
                            "style": "primary",
                            "color": "#1E90FF",
                            "height": "sm",
                            "action": {
                              "type": "message",
                              "label": "A123是誰",
                              "text": "A123"
                            }
                          },
                          {
                            "type": "button",
                            "style": "primary",
                            "color": "#32CD32",
                            "height": "sm",
                            "action": {
                              "type": "message",
                              "label": "B123是誰",
                              "text": "B123"
                            }
                          },
                          {
                            "type": "button",
                            "style": "primary",
                            "color": "#FF4500",
                            "height": "sm",
                            "action": {
                              "type": "message",
                              "label": "C123是誰",
                              "text": "C123"
                            }
                          }
                        ]
                      }
                    }
                  }
                ]
              }
          type: raw-text
        desc: ''
        headers: |-
          Authorization: Bearer {{#env.LINE_CHANNEL_ACCESS_TOKEN#}}
          Content-Type: application/json
        method: post
        params: ''
        retry_config:
          max_retries: 3
          retry_enabled: true
          retry_interval: 100
        selected: false
        ssl_verify: true
        timeout:
          connect: 3
          max_execution_time: 15
          read: 15
          write: 15
        title: 發送至 LINE（Flex Message）
        type: http-request
        url: https://api.line.me/v2/bot/message/push
        variables: []
      height: 173
      id: http_request_line
      position:
        x: 380
        y: 282
      positionAbsolute:
        x: 380
        y: 282
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        answer: OK! 訊息已發送至 LINE。
        desc: ''
        selected: false
        title: 回覆 OK
        type: answer
        variables: []
      height: 103
      id: answer
      position:
        x: 680
        y: 282
      positionAbsolute:
        x: 680
        y: 282
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    viewport:
      x: -158.5
      y: -29.5
      zoom: 1
  rag_pipeline_variables: []
